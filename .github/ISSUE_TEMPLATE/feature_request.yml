name: Feature request
description: Suggest an improvement to models, evaluation, figures, or repository workflow.
title: "[feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What pain point or missed capability are you trying to address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior, API, or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include experiments, figures, datasets, or references if relevant.
