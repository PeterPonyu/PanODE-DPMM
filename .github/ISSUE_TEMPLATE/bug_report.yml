name: Bug report
description: Report a reproducible problem in the Python pipeline, figures, or viewer.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include a minimal reproduction so the issue can be verified.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - models
        - benchmarks
        - eval_lib
        - refined_figures
        - model-arch-viewer
        - docs / repo tooling
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include commands, inputs, and dataset assumptions.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install method, and optional dependency extras.
